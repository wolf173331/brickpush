<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Retro pixel-art rabbit character -->
  <!-- Shadow -->
  <ellipse cx="24" cy="44" rx="12" ry="3" fill="#00000033"/>
  <!-- Ears -->
  <rect x="14" y="2" width="6" height="14" rx="3" fill="#FFFFFF" stroke="#222222" stroke-width="2"/>
  <rect x="28" y="2" width="6" height="14" rx="3" fill="#FFFFFF" stroke="#222222" stroke-width="2"/>
  <!-- Inner ears -->
  <rect x="16" y="5" width="2" height="8" rx="1" fill="#FFAABB"/>
  <rect x="30" y="5" width="2" height="8" rx="1" fill="#FFAABB"/>
  <!-- Body -->
  <ellipse cx="24" cy="30" rx="13" ry="14" fill="#FFFFFF" stroke="#222222" stroke-width="2"/>
  <!-- Belly -->
  <ellipse cx="24" cy="33" rx="8" ry="8" fill="#F5F0F0"/>
  <!-- Eyes -->
  <circle cx="19" cy="25" r="2.5" fill="#222222"/>
  <circle cx="29" cy="25" r="2.5" fill="#222222"/>
  <!-- Eye highlights -->
  <circle cx="20" cy="24" r="1" fill="#FFFFFF"/>
  <circle cx="30" cy="24" r="1" fill="#FFFFFF"/>
  <!-- Nose -->
  <ellipse cx="24" cy="29" rx="2" ry="1.5" fill="#FFAABB"/>
  <!-- Mouth -->
  <path d="M22 31 Q24 33 26 31" fill="none" stroke="#222222" stroke-width="1" stroke-linecap="round"/>
  <!-- Arms -->
  <ellipse cx="11" cy="30" rx="3" ry="5" fill="#FFFFFF" stroke="#222222" stroke-width="1.5"/>
  <ellipse cx="37" cy="30" rx="3" ry="5" fill="#FFFFFF" stroke="#222222" stroke-width="1.5"/>
  <!-- Feet -->
  <ellipse cx="18" cy="42" rx="5" ry="3" fill="#FFFFFF" stroke="#222222" stroke-width="1.5"/>
  <ellipse cx="30" cy="42" rx="5" ry="3" fill="#FFFFFF" stroke="#222222" stroke-width="1.5"/>
  <!-- Cheeks -->
  <circle cx="15" cy="30" r="2" fill="#FFCCDD" opacity="0.6"/>
  <circle cx="33" cy="30" r="2" fill="#FFCCDD" opacity="0.6"/>
</svg>