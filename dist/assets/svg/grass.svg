<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- 基础草地色，填满整格，边缘无边框保证无缝拼接 -->
  <rect x="0" y="0" width="48" height="48" fill="#5A8A3C"/>

  <!-- 深色草地纹理斑块，模拟草丛深浅 -->
  <rect x="0"  y="0"  width="16" height="16" fill="#4E7D33" opacity="0.5"/>
  <rect x="16" y="16" width="16" height="16" fill="#4E7D33" opacity="0.5"/>
  <rect x="32" y="0"  width="16" height="16" fill="#4E7D33" opacity="0.5"/>
  <rect x="0"  y="32" width="16" height="16" fill="#4E7D33" opacity="0.5"/>
  <rect x="32" y="32" width="16" height="16" fill="#4E7D33" opacity="0.5"/>

  <!-- 亮色草地斑块 -->
  <rect x="16" y="0"  width="16" height="16" fill="#66A044" opacity="0.4"/>
  <rect x="0"  y="16" width="16" height="16" fill="#66A044" opacity="0.4"/>
  <rect x="32" y="16" width="16" height="16" fill="#66A044" opacity="0.4"/>
  <rect x="16" y="32" width="16" height="16" fill="#66A044" opacity="0.4"/>

  <!-- 草叶短线，模拟俯视草丛 -->
  <line x1="4"  y1="6"  x2="6"  y2="2"  stroke="#7DC455" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="8"  y1="4"  x2="9"  y2="1"  stroke="#6BB548" stroke-width="1"   stroke-linecap="round" opacity="0.8"/>
  <line x1="12" y1="7"  x2="13" y2="3"  stroke="#7DC455" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>

  <line x1="20" y1="5"  x2="22" y2="1"  stroke="#6BB548" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="26" y1="7"  x2="27" y2="3"  stroke="#7DC455" stroke-width="1"   stroke-linecap="round" opacity="0.8"/>

  <line x1="36" y1="5"  x2="38" y2="1"  stroke="#7DC455" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="42" y1="7"  x2="43" y2="3"  stroke="#6BB548" stroke-width="1"   stroke-linecap="round" opacity="0.8"/>
  <line x1="46" y1="5"  x2="47" y2="2"  stroke="#7DC455" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>

  <line x1="3"  y1="22" x2="5"  y2="18" stroke="#7DC455" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="9"  y1="20" x2="10" y2="16" stroke="#6BB548" stroke-width="1"   stroke-linecap="round" opacity="0.8"/>
  <line x1="14" y1="23" x2="15" y2="19" stroke="#7DC455" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>

  <line x1="22" y1="21" x2="24" y2="17" stroke="#6BB548" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="28" y1="23" x2="29" y2="19" stroke="#7DC455" stroke-width="1"   stroke-linecap="round" opacity="0.8"/>

  <line x1="35" y1="21" x2="37" y2="17" stroke="#7DC455" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="41" y1="23" x2="42" y2="19" stroke="#6BB548" stroke-width="1"   stroke-linecap="round" opacity="0.8"/>
  <line x1="46" y1="20" x2="47" y2="17" stroke="#7DC455" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>

  <line x1="4"  y1="38" x2="6"  y2="34" stroke="#6BB548" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="10" y1="36" x2="11" y2="32" stroke="#7DC455" stroke-width="1"   stroke-linecap="round" opacity="0.8"/>
  <line x1="14" y1="39" x2="15" y2="35" stroke="#6BB548" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>

  <line x1="21" y1="37" x2="23" y2="33" stroke="#7DC455" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="27" y1="39" x2="28" y2="35" stroke="#6BB548" stroke-width="1"   stroke-linecap="round" opacity="0.8"/>

  <line x1="36" y1="37" x2="38" y2="33" stroke="#6BB548" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="42" y1="39" x2="43" y2="35" stroke="#7DC455" stroke-width="1"   stroke-linecap="round" opacity="0.8"/>
  <line x1="46" y1="36" x2="47" y2="33" stroke="#6BB548" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>

  <!-- 极淡的网格线，模拟地砖缝隙感（可选，增加"能踩"的地面感） -->
  <line x1="0" y1="24" x2="48" y2="24" stroke="#3D6B28" stroke-width="0.5" opacity="0.25"/>
  <line x1="24" y1="0" x2="24" y2="48" stroke="#3D6B28" stroke-width="0.5" opacity="0.25"/>
</svg>
