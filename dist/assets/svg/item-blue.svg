<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Blue consumable potion/orb with glow -->
  <!-- Glow effect -->
  <circle cx="16" cy="16" r="14" fill="#4488FF" opacity="0.12"/>
  <circle cx="16" cy="16" r="10" fill="#4488FF" opacity="0.08"/>
  <!-- Bottle/orb body -->
  <circle cx="16" cy="18" r="10" fill="#4488FF" stroke="#222222" stroke-width="1.5"/>
  <!-- Bottle neck -->
  <rect x="13" y="6" width="6" height="4" rx="1" fill="#5599FF" stroke="#222222" stroke-width="1"/>
  <!-- Bottle cap/cork -->
  <rect x="12" y="4" width="8" height="3" rx="1.5" fill="#DDDDDD" stroke="#222222" stroke-width="1"/>
  <!-- Body highlight -->
  <ellipse cx="13" cy="15" rx="4" ry="5" fill="#66AAFF" opacity="0.6"/>
  <!-- Shine spot -->
  <circle cx="12" cy="14" r="2" fill="#FFFFFF" opacity="0.5"/>
  <!-- Bottom shadow -->
  <ellipse cx="16" cy="24" rx="6" ry="2" fill="#2255BB" opacity="0.4"/>
  <!-- Liquid bubbles -->
  <circle cx="14" cy="20" r="1" fill="#88BBFF" opacity="0.7"/>
  <circle cx="19" cy="22" r="0.8" fill="#88BBFF" opacity="0.5"/>
  <circle cx="16" cy="18" r="0.6" fill="#AADDFF" opacity="0.6"/>
  <!-- Sparkle -->
  <polygon points="10,12 11,10 12,12 11,14" fill="#FFFFFF" opacity="0.7"/>
</svg>