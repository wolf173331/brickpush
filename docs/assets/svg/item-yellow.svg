<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Yellow collectible gem/diamond with glow -->
  <!-- Glow effect -->
  <circle cx="16" cy="16" r="14" fill="#FFD700" opacity="0.15"/>
  <circle cx="16" cy="16" r="10" fill="#FFD700" opacity="0.1"/>
  <!-- Diamond shape -->
  <polygon points="16,2 28,14 16,30 4,14" fill="#FFD700" stroke="#222222" stroke-width="1.5"/>
  <!-- Top facet (lighter) -->
  <polygon points="16,2 28,14 16,14 4,14" fill="#FFE84D"/>
  <!-- Bottom facet (darker) -->
  <polygon points="4,14 16,14 16,30" fill="#DDBB00"/>
  <polygon points="28,14 16,14 16,30" fill="#CC9900"/>
  <!-- Center line -->
  <line x1="4" y1="14" x2="28" y2="14" stroke="#BB8800" stroke-width="0.5"/>
  <line x1="16" y1="2" x2="16" y2="30" stroke="#BB8800" stroke-width="0.5"/>
  <!-- Sparkle highlight -->
  <polygon points="10,10 11,8 12,10 11,12" fill="#FFFFFF" opacity="0.8"/>
  <!-- Shine -->
  <path d="M8 10 L14 8 L16 4" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.6"/>
</svg>