<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Blue round enemy - circle blob with eyes -->
  <!-- Shadow -->
  <ellipse cx="24" cy="44" rx="14" ry="3" fill="#00000033"/>
  <!-- Body -->
  <circle cx="24" cy="26" r="16" fill="#4488FF" stroke="#222222" stroke-width="2"/>
  <!-- Body highlight -->
  <ellipse cx="20" cy="20" rx="8" ry="6" fill="#66AAFF" opacity="0.5"/>
  <!-- Body bottom shadow -->
  <ellipse cx="24" cy="36" rx="12" ry="4" fill="#2266CC" opacity="0.4"/>
  <!-- Eyes whites -->
  <ellipse cx="18" cy="24" rx="5" ry="6" fill="#FFFFFF" stroke="#222222" stroke-width="1"/>
  <ellipse cx="30" cy="24" rx="5" ry="6" fill="#FFFFFF" stroke="#222222" stroke-width="1"/>
  <!-- Pupils -->
  <circle cx="19" cy="25" r="2.5" fill="#222222"/>
  <circle cx="31" cy="25" r="2.5" fill="#222222"/>
  <!-- Eye highlights -->
  <circle cx="17.5" cy="23" r="1.2" fill="#FFFFFF"/>
  <circle cx="29.5" cy="23" r="1.2" fill="#FFFFFF"/>
  <!-- Mouth -->
  <ellipse cx="24" cy="33" rx="4" ry="2" fill="#1155AA" stroke="#222222" stroke-width="1"/>
  <!-- Teeth -->
  <rect x="21" y="32" width="2.5" height="2" rx="0.5" fill="#FFFFFF"/>
  <rect x="24.5" y="32" width="2.5" height="2" rx="0.5" fill="#FFFFFF"/>
  <!-- Small bounce feet -->
  <ellipse cx="18" cy="42" rx="4" ry="2" fill="#3377DD" stroke="#222222" stroke-width="1"/>
  <ellipse cx="30" cy="42" rx="4" ry="2" fill="#3377DD" stroke="#222222" stroke-width="1"/>
</svg>