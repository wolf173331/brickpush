<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- 基础色填满整格，边缘无边框，确保四方无缝拼接 -->
  <rect x="0" y="0" width="48" height="48" fill="#44BBAA"/>
  <!-- 顶部高光斜面（从边缘内缩4px开始，不碰边缘） -->
  <polygon points="0,0 48,0 44,4 4,4" fill="#66DDCC" opacity="0.75"/>
  <!-- 左侧高光斜面 -->
  <polygon points="0,0 4,4 4,44 0,48" fill="#55CCBB" opacity="0.55"/>
  <!-- 底部阴影斜面 -->
  <polygon points="0,48 4,44 44,44 48,48" fill="#2D9988" opacity="0.75"/>
  <!-- 右侧阴影斜面 -->
  <polygon points="48,0 48,48 44,44 44,4" fill="#267A6A" opacity="0.75"/>
  <!-- 中心平面 -->
  <rect x="4" y="4" width="40" height="40" fill="#44BBAA"/>
  <!-- 内部十字纹理（极淡，增加质感） -->
  <line x1="24" y1="4" x2="24" y2="44" stroke="#3DAA99" stroke-width="1" opacity="0.3"/>
  <line x1="4" y1="24" x2="44" y2="24" stroke="#3DAA99" stroke-width="1" opacity="0.3"/>
  <!-- 左上角小高光 -->
  <rect x="6" y="6" width="8" height="8" rx="1" fill="#88EEDD" opacity="0.3"/>
</svg>
