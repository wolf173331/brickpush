<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Reward heart block - red heart on teal base -->
  <!-- Dark outline -->
  <rect x="1" y="1" width="46" height="46" rx="2" fill="#222222"/>
  <!-- Block base -->
  <rect x="2" y="2" width="44" height="44" rx="2" fill="#44BBAA"/>
  <!-- Top bevel (highlight) -->
  <path d="M4 4 L44 4 L40 8 L8 8 Z" fill="#66DDCC" opacity="0.8"/>
  <!-- Left bevel (highlight) -->
  <path d="M4 4 L8 8 L8 40 L4 44 Z" fill="#55CCBB" opacity="0.6"/>
  <!-- Bottom bevel (shadow) -->
  <path d="M4 44 L8 40 L40 40 L44 44 Z" fill="#339988" opacity="0.8"/>
  <!-- Right bevel (shadow) -->
  <path d="M44 4 L44 44 L40 40 L40 8 Z" fill="#2D8878" opacity="0.8"/>
  <!-- Center face -->
  <rect x="8" y="8" width="32" height="32" rx="1" fill="#44BBAA"/>
  <!-- Heart shape -->
  <path d="M24 35 C16 28 10 22 10 18 C10 14 13 12 16 12 C19 12 22 14 24 17 C26 14 29 12 32 12 C35 12 38 14 38 18 C38 22 32 28 24 35 Z"
        fill="#FF4444" stroke="#CC2222" stroke-width="1.5"/>
  <!-- Heart highlight -->
  <path d="M16 15 C14 15 12 17 12 19 C12 20 13 21 14 22" fill="none" stroke="#FF7777" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>