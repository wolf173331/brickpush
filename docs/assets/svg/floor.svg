<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Gray stone floor tile - seamless grid -->
  <!-- Base -->
  <rect width="48" height="48" fill="#888899"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="12" x2="48" y2="12" stroke="#7A7A8B" stroke-width="0.5"/>
  <line x1="0" y1="24" x2="48" y2="24" stroke="#7A7A8B" stroke-width="0.5"/>
  <line x1="0" y1="36" x2="48" y2="36" stroke="#7A7A8B" stroke-width="0.5"/>
  <line x1="12" y1="0" x2="12" y2="48" stroke="#7A7A8B" stroke-width="0.5"/>
  <line x1="24" y1="0" x2="24" y2="48" stroke="#7A7A8B" stroke-width="0.5"/>
  <line x1="36" y1="0" x2="36" y2="48" stroke="#7A7A8B" stroke-width="0.5"/>
  <!-- Light highlight lines -->
  <line x1="0" y1="12.5" x2="48" y2="12.5" stroke="#9999AA" stroke-width="0.3"/>
  <line x1="0" y1="24.5" x2="48" y2="24.5" stroke="#9999AA" stroke-width="0.3"/>
  <line x1="0" y1="36.5" x2="48" y2="36.5" stroke="#9999AA" stroke-width="0.3"/>
  <line x1="12.5" y1="0" x2="12.5" y2="48" stroke="#9999AA" stroke-width="0.3"/>
  <line x1="24.5" y1="0" x2="24.5" y2="48" stroke="#9999AA" stroke-width="0.3"/>
  <line x1="36.5" y1="0" x2="36.5" y2="48" stroke="#9999AA" stroke-width="0.3"/>
  <!-- Subtle stone texture dots -->
  <circle cx="6" cy="6" r="0.8" fill="#8080918a"/>
  <circle cx="18" cy="18" r="0.6" fill="#7777888a"/>
  <circle cx="30" cy="6" r="0.7" fill="#8080918a"/>
  <circle cx="42" cy="18" r="0.5" fill="#7777888a"/>
  <circle cx="6" cy="30" r="0.6" fill="#7777888a"/>
  <circle cx="18" cy="42" r="0.8" fill="#8080918a"/>
  <circle cx="30" cy="30" r="0.5" fill="#8080918a"/>
  <circle cx="42" cy="42" r="0.7" fill="#7777888a"/>
</svg>