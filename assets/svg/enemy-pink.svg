<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Pink oval enemy - ellipse-shaped cute creature -->
  <!-- Shadow -->
  <ellipse cx="24" cy="44" rx="14" ry="3" fill="#00000033"/>
  <!-- Body -->
  <ellipse cx="24" cy="28" rx="17" ry="14" fill="#FF88AA" stroke="#222222" stroke-width="2"/>
  <!-- Body highlight -->
  <ellipse cx="20" cy="22" rx="8" ry="5" fill="#FFAACC" opacity="0.5"/>
  <!-- Body bottom shadow -->
  <ellipse cx="24" cy="38" rx="12" ry="3" fill="#DD6688" opacity="0.4"/>
  <!-- Eyes whites -->
  <ellipse cx="18" cy="26" rx="4.5" ry="5.5" fill="#FFFFFF" stroke="#222222" stroke-width="1"/>
  <ellipse cx="30" cy="26" rx="4.5" ry="5.5" fill="#FFFFFF" stroke="#222222" stroke-width="1"/>
  <!-- Pupils -->
  <circle cx="19" cy="27" r="2.5" fill="#222222"/>
  <circle cx="31" cy="27" r="2.5" fill="#222222"/>
  <!-- Eye highlights -->
  <circle cx="17.5" cy="25" r="1.2" fill="#FFFFFF"/>
  <circle cx="29.5" cy="25" r="1.2" fill="#FFFFFF"/>
  <!-- Eyelashes -->
  <line x1="14" y1="22" x2="16" y2="23" stroke="#222222" stroke-width="1" stroke-linecap="round"/>
  <line x1="13" y1="24" x2="15" y2="24.5" stroke="#222222" stroke-width="1" stroke-linecap="round"/>
  <line x1="34" y1="22" x2="32" y2="23" stroke="#222222" stroke-width="1" stroke-linecap="round"/>
  <line x1="35" y1="24" x2="33" y2="24.5" stroke="#222222" stroke-width="1" stroke-linecap="round"/>
  <!-- Blush cheeks -->
  <circle cx="13" cy="30" r="2.5" fill="#FF6688" opacity="0.5"/>
  <circle cx="35" cy="30" r="2.5" fill="#FF6688" opacity="0.5"/>
  <!-- Cute mouth -->
  <path d="M22 33 Q24 35 26 33" fill="none" stroke="#CC4466" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small antennae/ribbons -->
  <circle cx="16" cy="14" r="2.5" fill="#FF6699" stroke="#222222" stroke-width="1"/>
  <line x1="16" y1="16" x2="18" y2="20" stroke="#222222" stroke-width="1"/>
  <circle cx="32" cy="14" r="2.5" fill="#FF6699" stroke="#222222" stroke-width="1"/>
  <line x1="32" y1="16" x2="30" y2="20" stroke="#222222" stroke-width="1"/>
  <!-- Tiny feet -->
  <ellipse cx="18" cy="42" rx="4" ry="2" fill="#EE7799" stroke="#222222" stroke-width="1"/>
  <ellipse cx="30" cy="42" rx="4" ry="2" fill="#EE7799" stroke="#222222" stroke-width="1"/>
</svg>