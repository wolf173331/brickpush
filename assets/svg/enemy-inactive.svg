<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Silver unactivated/dormant enemy - dull sphere/egg -->
  <!-- Shadow -->
  <ellipse cx="24" cy="44" rx="12" ry="3" fill="#00000033"/>
  <!-- Egg/sphere body -->
  <ellipse cx="24" cy="26" rx="15" ry="17" fill="#999999" stroke="#666666" stroke-width="2"/>
  <!-- Metallic gradient highlight -->
  <ellipse cx="20" cy="20" rx="8" ry="10" fill="#AAAAAA" opacity="0.5"/>
  <!-- Top highlight spot -->
  <ellipse cx="18" cy="16" rx="5" ry="4" fill="#BBBBBB" opacity="0.6"/>
  <!-- Bottom shadow -->
  <ellipse cx="24" cy="38" rx="10" ry="4" fill="#777777" opacity="0.4"/>
  <!-- Subtle dormant line/crack -->
  <path d="M18 24 Q20 22 22 24 Q24 26 26 24 Q28 22 30 24" fill="none" stroke="#888888" stroke-width="1" opacity="0.5"/>
  <!-- Very faint closed eye indentations -->
  <line x1="17" y1="24" x2="21" y2="24" stroke="#888888" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="27" y1="24" x2="31" y2="24" stroke="#888888" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>