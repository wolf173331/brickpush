<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Silver mechanical enemy - robot/gear face -->
  <!-- Shadow -->
  <ellipse cx="24" cy="44" rx="14" ry="3" fill="#00000033"/>
  <!-- Gear-like body outline -->
  <circle cx="24" cy="24" r="18" fill="#8899AA" stroke="#222222" stroke-width="2"/>
  <!-- Gear teeth -->
  <rect x="20" y="2" width="8" height="5" rx="1" fill="#8899AA" stroke="#222222" stroke-width="1"/>
  <rect x="20" y="41" width="8" height="5" rx="1" fill="#8899AA" stroke="#222222" stroke-width="1"/>
  <rect x="2" y="20" width="5" height="8" rx="1" fill="#8899AA" stroke="#222222" stroke-width="1"/>
  <rect x="41" y="20" width="5" height="8" rx="1" fill="#8899AA" stroke="#222222" stroke-width="1"/>
  <!-- Diagonal gear teeth -->
  <rect x="5" y="8" width="7" height="4" rx="1" fill="#8899AA" stroke="#222222" stroke-width="1" transform="rotate(-45 8.5 10)"/>
  <rect x="36" y="8" width="7" height="4" rx="1" fill="#8899AA" stroke="#222222" stroke-width="1" transform="rotate(45 39.5 10)"/>
  <rect x="5" y="36" width="7" height="4" rx="1" fill="#8899AA" stroke="#222222" stroke-width="1" transform="rotate(45 8.5 38)"/>
  <rect x="36" y="36" width="7" height="4" rx="1" fill="#8899AA" stroke="#222222" stroke-width="1" transform="rotate(-45 39.5 38)"/>
  <!-- Inner face plate -->
  <circle cx="24" cy="24" r="14" fill="#AABBCC" stroke="#667788" stroke-width="1"/>
  <!-- Metallic highlight -->
  <ellipse cx="20" cy="18" rx="8" ry="5" fill="#BBCCDD" opacity="0.5"/>
  <!-- Eye sockets -->
  <rect x="14" y="18" width="8" height="6" rx="1" fill="#334455" stroke="#222222" stroke-width="1"/>
  <rect x="26" y="18" width="8" height="6" rx="1" fill="#334455" stroke="#222222" stroke-width="1"/>
  <!-- Eye lights (red) -->
  <circle cx="18" cy="21" r="2" fill="#FF3333"/>
  <circle cx="30" cy="21" r="2" fill="#FF3333"/>
  <!-- Eye glow -->
  <circle cx="18" cy="21" r="1" fill="#FF8888"/>
  <circle cx="30" cy="21" r="1" fill="#FF8888"/>
  <!-- Mouth grill -->
  <rect x="17" y="28" width="14" height="5" rx="1" fill="#445566" stroke="#222222" stroke-width="1"/>
  <line x1="20" y1="28" x2="20" y2="33" stroke="#556677" stroke-width="1"/>
  <line x1="24" y1="28" x2="24" y2="33" stroke="#556677" stroke-width="1"/>
  <line x1="28" y1="28" x2="28" y2="33" stroke="#556677" stroke-width="1"/>
  <!-- Screws/rivets -->
  <circle cx="12" cy="24" r="1.5" fill="#778899" stroke="#556677" stroke-width="0.5"/>
  <circle cx="36" cy="24" r="1.5" fill="#778899" stroke="#556677" stroke-width="0.5"/>
  <circle cx="24" cy="12" r="1.5" fill="#778899" stroke="#556677" stroke-width="0.5"/>
  <circle cx="24" cy="36" r="1.5" fill="#778899" stroke="#556677" stroke-width="0.5"/>
</svg>