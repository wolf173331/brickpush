<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线排行榜测试 - BrickPush</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .status {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
        .status-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 15px;
        }
        .status-online { background: #4CAF50; }
        .status-offline { background: #f44336; }
        .status-checking { background: #FF9800; }
        .config-section {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: linear-gradient(45deg, #FF6B6B, #FF8E53);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s;
            width: 100%;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .buttons button {
            flex: 1;
        }
        .test-results {
            margin-top: 30px;
        }
        .result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            display: none;
        }
        .result.success {
            background: rgba(76, 175, 80, 0.2);
            border-left: 5px solid #4CAF50;
            display: block;
        }
        .result.error {
            background: rgba(244, 67, 54, 0.2);
            border-left: 5px solid #f44336;
            display: block;
        }
        .leaderboard {
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .leaderboard h3 {
            text-align: center;
            margin-bottom: 15px;
        }
        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .leaderboard-entry:last-child {
            border-bottom: none;
        }
        .rank { font-weight: bold; }
        .name { flex: 1; margin-left: 20px; }
        .score { color: #FFD700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 在线排行榜测试</h1>
        
        <div class="status" id="status">
            <div class="status-dot status-checking"></div>
            <span>正在检查在线功能状态...</span>
        </div>
        
        <div class="config-section">
            <h3>🔧 Supabase 配置</h3>
            <p>请从 <code>SETUP_SUPABASE_GUIDE.md</code> 指南中获取以下信息：</p>
            
            <label>Supabase URL:</label>
            <input type="text" id="supabaseUrl" placeholder="https://your-project-id.supabase.co">
            
            <label>Anon Key:</label>
            <input type="text" id="supabaseKey" placeholder="eyJ...">
            
            <div class="buttons">
                <button onclick="saveConfig()">💾 保存配置</button>
                <button onclick="testConnection()">🔗 测试连接</button>
            </div>
        </div>
        
        <div class="config-section">
            <h3>🎯 排行榜测试</h3>
            <p>测试在线排行榜的保存和加载功能：</p>
            
            <div class="buttons">
                <button onclick="addTestEntry()">➕ 添加测试记录</button>
                <button onclick="loadLeaderboard()">🔄 加载排行榜</button>
                <button onclick="clearLocal()">🗑️ 清除本地数据</button>
            </div>
        </div>
        
        <div class="test-results">
            <div id="result" class="result"></div>
            
            <div class="leaderboard" id="leaderboardContainer">
                <h3>🏆 排行榜</h3>
                <div id="leaderboard">
                    <p style="text-align: center;">点击"加载排行榜"按钮查看数据</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 从localStorage加载配置
        function loadConfig() {
            const url = localStorage.getItem('supabase_url') || ''
            const key = localStorage.getItem('supabase_key') || ''
            
            document.getElementById('supabaseUrl').value = url
            document.getElementById('supabaseKey').value = key
            
            // 如果有配置，设置全局变量
            if (url && key) {
                window.SUPABASE_CONFIG = { url, key }
                updateStatus('online', '配置已加载，Supabase已就绪')
            } else {
                updateStatus('offline', '未配置Supabase，使用本地模式')
            }
        }
        
        // 保存配置
        function saveConfig() {
            const url = document.getElementById('supabaseUrl').value.trim()
            const key = document.getElementById('supabaseKey').value.trim()
            
            if (!url || !key) {
                showResult('请输入完整的Supabase配置', 'error')
                return
            }
            
            localStorage.setItem('supabase_url', url)
            localStorage.setItem('supabase_key', key)
            
            // 设置全局变量
            window.SUPABASE_CONFIG = { url, key }
            
            showResult('配置已保存！', 'success')
            updateStatus('online', '配置已保存，Supabase已就绪')
        }
        
        // 测试连接
        async function testConnection() {
            const url = document.getElementById('supabaseUrl').value.trim()
            const key = document.getElementById('supabaseKey').value.trim()
            
            if (!url || !key) {
                showResult('请先填写Supabase配置', 'error')
                return
            }
            
            updateStatus('checking', '正在测试连接...')
            
            try {
                // 测试REST API连接
                const response = await fetch(`${url}/rest/v1/_health`, {
                    headers: {
                        'apikey': key,
                        'Authorization': `Bearer ${key}`
                    }
                })
                
                if (response.ok) {
                    showResult('✅ 连接成功！Supabase服务正常。', 'success')
                    updateStatus('online', 'Supabase连接正常')
                    
                    // 保存配置
                    saveConfig()
                } else {
                    showResult(`❌ 连接失败: HTTP ${response.status}`, 'error')
                    updateStatus('offline', '连接失败')
                }
            } catch (error) {
                showResult(`❌ 连接错误: ${error.message}`, 'error')
                updateStatus('offline', '连接错误')
            }
        }
        
        // 添加测试记录
        async function addTestEntry() {
            if (!window.SUPABASE_CONFIG) {
                showResult('请先配置Supabase', 'error')
                return
            }
            
            updateStatus('checking', '正在保存测试记录...')
            
            try {
                const testNames = ['PLAYER1', 'HERO', 'CHAMP', 'MASTER', 'GAMER']
                const randomName = testNames[Math.floor(Math.random() * testNames.length)]
                const randomScore = Math.floor(Math.random() * 1000) + 100
                const levelName = '测试关卡'
                
                const response = await fetch(`${window.SUPABASE_CONFIG.url}/rest/v1/leaderboard`, {
                    method: 'POST',
                    headers: {
                        'apikey': window.SUPABASE_CONFIG.key,
                        'Authorization': `Bearer ${window.SUPABASE_CONFIG.key}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        player_name: randomName,
                        score: randomScore,
                        level_name: levelName
                    })
                })
                
                if (response.ok) {
                    const data = await response.json()
                    showResult(`✅ 测试记录已添加: ${randomName} - ${randomScore}分`, 'success')
                    updateStatus('online', '记录保存成功')
                    
                    // 同时保存到本地存储
                    const localEntries = JSON.parse(localStorage.getItem('brickpush:leaderboard') || '[]')
                    localEntries.push({
                        name: randomName,
                        score: randomScore,
                        levelName: levelName,
                        timestamp: Date.now()
                    })
                    localEntries.sort((a, b) => b.score - a.score)
                    localStorage.setItem('brickpush:leaderboard', JSON.stringify(localEntries.slice(0, 20)))
                    
                    // 重新加载排行榜
                    loadLeaderboard()
                } else {
                    showResult(`❌ 保存失败: HTTP ${response.status}`, 'error')
                    updateStatus('offline', '保存失败')
                }
            } catch (error) {
                showResult(`❌ 保存错误: ${error.message}`, 'error')
                updateStatus('offline', '保存错误')
            }
        }
        
        // 加载排行榜
        async function loadLeaderboard() {
            updateStatus('checking', '正在加载排行榜...')
            
            try {
                let entries = []
                
                // 尝试从Supabase加载
                if (window.SUPABASE_CONFIG) {
                    const response = await fetch(`${window.SUPABASE_CONFIG.url}/rest/v1/leaderboard?select=*&order=score.desc&limit=20`, {
                        headers: {
                            'apikey': window.SUPABASE_CONFIG.key,
                            'Authorization': `Bearer ${window.SUPABASE_CONFIG.key}`
                        }
                    })
                    
                    if (response.ok) {
                        entries = await response.json()
                        showResult(`✅ 从Supabase加载了 ${entries.length} 条记录`, 'success')
                        updateStatus('online', '在线排行榜加载成功')
                    } else {
                        // 回退到本地存储
                        entries = JSON.parse(localStorage.getItem('brickpush:leaderboard') || '[]')
                        showResult(`⚠️ 在线加载失败，使用本地存储: ${entries.length} 条记录`, 'error')
                        updateStatus('offline', '使用本地存储')
                    }
                } else {
                    // 使用本地存储
                    entries = JSON.parse(localStorage.getItem('brickpush:leaderboard') || '[]')
                    showResult(`📱 从本地存储加载了 ${entries.length} 条记录`, 'success')
                    updateStatus('offline', '本地存储模式')
                }
                
                // 显示排行榜
                displayLeaderboard(entries)
            } catch (error) {
                showResult(`❌ 加载错误: ${error.message}`, 'error')
                updateStatus('offline', '加载错误')
            }
        }
        
        // 显示排行榜
        function displayLeaderboard(entries) {
            const container = document.getElementById('leaderboard')
            
            if (!entries || entries.length === 0) {
                container.innerHTML = '<p style="text-align: center;">暂无记录</p>'
                return
            }
            
            let html = ''
            entries.forEach((entry, index) => {
                const rank = index + 1
                const name = entry.player_name || entry.name || '未知玩家'
                const score = entry.score || 0
                const levelName = entry.level_name || entry.levelName || '未知关卡'
                const date = entry.created_at ? new Date(entry.created_at).toLocaleString() : 
                           entry.timestamp ? new Date(entry.timestamp).toLocaleString() : '未知时间'
                
                html += `
                <div class="leaderboard-entry">
                    <span class="rank">#${rank}</span>
                    <span class="name">${name}</span>
                    <span class="score">${score}分</span>
                </div>
                `
            })
            
            container.innerHTML = html
        }
        
        // 清除本地数据
        function clearLocal() {
            if (confirm('确定要清除本地排行榜数据吗？')) {
                localStorage.removeItem('brickpush:leaderboard')
                showResult('✅ 本地排行榜数据已清除', 'success')
                document.getElementById('leaderboard').innerHTML = '<p style="text-align: center;">暂无记录</p>'
            }
        }
        
        // 更新状态显示
        function updateStatus(type, message) {
            const statusEl = document.getElementById('status')
            const dot = statusEl.querySelector('.status-dot')
            
            // 移除所有状态类
            dot.classList.remove('status-online', 'status-offline', 'status-checking')
            
            if (type === 'online') {
                dot.classList.add('status-online')
                statusEl.innerHTML = '<div class="status-dot status-online"></div><span>' + message + '</span>'
            } else if (type === 'offline') {
                dot.classList.add('status-offline')
                statusEl.innerHTML = '<div class="status-dot status-offline"></div><span>' + message + '</span>'
            } else {
                dot.classList.add('status-checking')
                statusEl.innerHTML = '<div class="status-dot status-checking"></div><span>' + message + '</span>'
            }
        }
        
        // 显示结果
        function showResult(message, type) {
            const resultEl = document.getElementById('result')
            resultEl.textContent = message
            resultEl.className = 'result ' + type
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            loadConfig()
        })
    </script>
</body>
</html>
