<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Dark stone wall tile - seamless brick pattern -->
  <!-- Base -->
  <rect width="48" height="48" fill="#444455"/>
  <!-- Inset border for depth -->
  <rect x="1" y="1" width="46" height="46" fill="#3D3D4E"/>
  <!-- Brick row 1 -->
  <rect x="2" y="2" width="20" height="10" rx="1" fill="#4A4A5C" stroke="#333344" stroke-width="1"/>
  <rect x="24" y="2" width="22" height="10" rx="1" fill="#505062" stroke="#333344" stroke-width="1"/>
  <!-- Brick row 2 (offset) -->
  <rect x="2" y="14" width="12" height="10" rx="1" fill="#505062" stroke="#333344" stroke-width="1"/>
  <rect x="16" y="14" width="18" height="10" rx="1" fill="#4A4A5C" stroke="#333344" stroke-width="1"/>
  <rect x="36" y="14" width="10" height="10" rx="1" fill="#4E4E60" stroke="#333344" stroke-width="1"/>
  <!-- Brick row 3 -->
  <rect x="2" y="26" width="22" height="10" rx="1" fill="#4E4E60" stroke="#333344" stroke-width="1"/>
  <rect x="26" y="26" width="20" height="10" rx="1" fill="#4A4A5C" stroke="#333344" stroke-width="1"/>
  <!-- Brick row 4 (offset) -->
  <rect x="2" y="38" width="10" height="8" rx="1" fill="#4A4A5C" stroke="#333344" stroke-width="1"/>
  <rect x="14" y="38" width="20" height="8" rx="1" fill="#505062" stroke="#333344" stroke-width="1"/>
  <rect x="36" y="38" width="10" height="8" rx="1" fill="#4E4E60" stroke="#333344" stroke-width="1"/>
  <!-- Highlight edges (top-left light) -->
  <line x1="0" y1="0" x2="48" y2="0" stroke="#555566" stroke-width="1"/>
  <line x1="0" y1="0" x2="0" y2="48" stroke="#555566" stroke-width="1"/>
  <!-- Shadow edges (bottom-right dark) -->
  <line x1="0" y1="47" x2="48" y2="47" stroke="#2A2A3A" stroke-width="1"/>
  <line x1="47" y1="0" x2="47" y2="48" stroke="#2A2A3A" stroke-width="1"/>
</svg>