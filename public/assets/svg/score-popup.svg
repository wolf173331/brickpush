  <rect x="4" y="27" width="3" height="1" rx="0.5" fill="#4488FF" opacity="0.2"/>
  <rect x="4" y="25" width="1" height="3" rx="0.5" fill="#4488FF" opacity="0.2"/>
  <rect x="57" y="27" width="3" height="1" rx="0.5" fill="#4488FF" opacity="0.2"/>
  <rect x="59" y="25" width="1" height="3" rx="0.5" fill="#4488FF" opacity="0.2"/>
