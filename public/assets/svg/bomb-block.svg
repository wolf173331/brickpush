<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Bomb block - black bomb embedded in dark wall -->
  <!-- Wall background -->
  <rect width="48" height="48" fill="#444455"/>
  <rect x="1" y="1" width="46" height="46" fill="#3D3D4E"/>
  <!-- Brick pattern background -->
  <rect x="2" y="2" width="20" height="10" rx="1" fill="#4A4A5C" stroke="#333344" stroke-width="0.5"/>
  <rect x="24" y="2" width="22" height="10" rx="1" fill="#505062" stroke="#333344" stroke-width="0.5"/>
  <rect x="2" y="38" width="12" height="8" rx="1" fill="#505062" stroke="#333344" stroke-width="0.5"/>
  <rect x="16" y="38" width="16" height="8" rx="1" fill="#4A4A5C" stroke="#333344" stroke-width="0.5"/>
  <rect x="34" y="38" width="12" height="8" rx="1" fill="#4E4E60" stroke="#333344" stroke-width="0.5"/>
  <!-- Bomb body -->
  <circle cx="24" cy="28" r="12" fill="#111111" stroke="#222222" stroke-width="2"/>
  <!-- Bomb highlight -->
  <ellipse cx="20" cy="24" rx="4" ry="3" fill="#333333" opacity="0.6"/>
  <!-- Bomb top nub -->
  <rect x="22" y="14" width="4" height="4" rx="1" fill="#444444" stroke="#222222" stroke-width="1"/>
  <!-- Fuse -->
  <path d="M26 14 Q30 8 34 6 Q36 5 38 6" fill="none" stroke="#886644" stroke-width="2" stroke-linecap="round"/>
  <!-- Fuse spark -->
  <circle cx="38" cy="6" r="3" fill="#FF6600" opacity="0.9"/>
  <circle cx="38" cy="6" r="2" fill="#FFAA00"/>
  <circle cx="38" cy="6" r="1" fill="#FFDD44"/>
  <!-- Spark rays -->
  <line x1="38" y1="2" x2="38" y2="0" stroke="#FFAA00" stroke-width="1" opacity="0.7"/>
  <line x1="41" y1="4" x2="43" y2="3" stroke="#FFAA00" stroke-width="1" opacity="0.7"/>
  <line x1="41" y1="8" x2="43" y2="9" stroke="#FF6600" stroke-width="1" opacity="0.5"/>
  <line x1="35" y1="4" x2="34" y2="2" stroke="#FF6600" stroke-width="1" opacity="0.5"/>
  <!-- Bomb skull detail -->
  <circle cx="21" cy="28" r="1.5" fill="#333333"/>
  <circle cx="27" cy="28" r="1.5" fill="#333333"/>
  <rect x="22" y="32" width="4" height="2" rx="0.5" fill="#333333"/>
</svg>